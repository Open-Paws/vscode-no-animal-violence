name: Desloppify Quality Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DESLOPPIFY_THRESHOLD: "85"

jobs:
  quality:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache desloppify install
        id: cache-desloppify
        uses: actions/cache@v4
        with:
          path: /tmp/desloppify
          key: desloppify-${{ runner.os }}-${{ hashFiles('.github/workflows/desloppify.yml') }}

      - name: Clone desloppify
        if: steps.cache-desloppify.outputs.cache-hit != 'true'
        run: |
          git clone --no-recurse-submodules https://github.com/Open-Paws/desloppify.git /tmp/desloppify

      - name: Install desloppify
        run: pip install "/tmp/desloppify[full]"

      - name: Run quality gate
        env:
          THRESHOLD: ${{ env.DESLOPPIFY_THRESHOLD }}
        run: |
          set -o pipefail
          SCAN_OUTPUT=$(desloppify scan --path . --profile ci --no-badge 2>&1)
          echo "${SCAN_OUTPUT}"
          SCORE=$(echo "${SCAN_OUTPUT}" | grep -oiE 'objective[^0-9]*[0-9]+(\.[0-9]+)?/100' | grep -oE '[0-9]+(\.[0-9]+)?' | head -n1)
          if [ -z "${SCORE}" ]; then
            echo "ERROR: could not extract objective score from desloppify output"
            exit 1
          fi
          echo "Objective score: ${SCORE}/100 (threshold ${THRESHOLD})"
          RESULT=$(SCORE="${SCORE}" THRESHOLD="${THRESHOLD}" python3 -c '
          import os
          score = float(os.environ["SCORE"])
          threshold = float(os.environ["THRESHOLD"])
          print("PASS" if score >= threshold else "FAIL")
          ')
          {
            echo "## Desloppify Quality Gate"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Objective score | **${SCORE}/100** |"
            echo "| Threshold | ${THRESHOLD} |"
            echo "| Scan path | \`.\` |"
            echo "| Result | **${RESULT}** |"
          } >> "${GITHUB_STEP_SUMMARY}"
          if [ "${RESULT}" = "FAIL" ]; then
            echo "FAIL: objective score ${SCORE} is below the minimum ${THRESHOLD}"
            exit 1
          fi
          echo "PASS: objective score ${SCORE} >= ${THRESHOLD}"
